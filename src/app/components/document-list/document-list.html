<div class="card p-4">
  <input type="file" #fileInput style="display: none" (change)="onNewVersionFileSelected($event)"
    accept=".pdf,.png,.jpg">

  <div class="header-container flex justify-content-between align-items-center mb-4">
    <h2 class="m-0 font-bold text-2xl" st>Gestão de Documentos</h2>

    <div class="flex gap-2 buttons-wrapper">
      @if (authService.isAdmin()) {
      <p-button label="Novo Usuário" icon="pi pi-user-plus" [text]="true" severity="secondary"
        (click)="isCreateUserVisible.set(true)" />
      }
      <p-button label="Upload de Arquivo" icon="pi pi-upload" severity="success" (click)="goToUpload()" />
    </div>
  </div>

  <div class="flex mb-4">
    <span class="p-input-icon-left w-full">
      <i class="pi pi-search filterCustom"></i>
      <input pInputText type="text" placeholder="Filtrar por título..." class="w-full filterCustom"
        [(ngModel)]="filters().title" (input)="loadDocuments()" />
    </span>
  </div>


  <p-table [value]="documents()" [lazy]="true" (onLazyLoad)="onPageChange($event)" [paginator]="true" [rows]="rows()"
    [rowsPerPageOptions]="[5, 10, 20, 50]" [totalRecords]="totalRecords()" [loading]="loading()"
    paginatorPosition="bottom" class="p-datatable-striped"
    currentPageReportTemplate="Exibindo documentos de {first} a {last} ( total de {totalRecords} ) "
    [showCurrentPageReport]="true">


    <ng-template pTemplate="header">
      <tr>
        <th>Título</th>
        <th>Status</th>
        <th>Versões</th>
        <th>Criado em</th>
        <th class="text-center action-th-custom">Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-doc>
      <tr>
        <td>{{ doc.title }}</td>
        <td>
          <p-tag [value]="doc.status" [severity]="getStatusSeverity(doc.status)" />
        </td>
        <td>
          <i class="pi pi-copy mr-2"></i>{{ doc.versionCount }}
        </td>
        <td>{{ doc.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td class="text-center">
          <p-button icon="pi pi-ellipsis-v" [text]="true" severity="secondary" [rounded]="true"
            (click)="prepareMenu($event, menu, doc)" pTooltip="Ações" />

          <p-menu #menu [model]="actionMenuItems" [popup]="true" appendTo="body" />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center p-4">Nenhum documento encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<app-user-create-dialog [(visible)]="isCreateUserVisible" (onSave)="loadDocuments()">
</app-user-create-dialog>

<app-document-history [visible]="isHistoryVisible()" [documentId]="selectedDoc?.id ?? null"
  [documentTitle]="selectedDoc?.title ?? ''" (onClose)="isHistoryVisible.set(false)"
  (onDownload)="downloadVersion($event)" />
