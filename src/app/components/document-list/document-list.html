<div class="card p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">Gestão de Documentos</h2>
    <div class="flex gap-2">
      <p-button label="Novo Usuário" icon="pi pi-user-plus" [text]="true" severity="secondary"
        (click)="isCreateUserVisible.set(true)" />

      <p-button label="Upload de Arquivo" icon="pi pi-upload" severity="primary" (click)="goToUpload()" />
    </div>
  </div>

  <div class="flex gap-3 mb-3">
    <span class="p-input-icon-left" style="flex: 1">
      <i class="pi pi-search"></i>
      <input pInputText type="text" placeholder="Filtrar por título..." class="w-full" [(ngModel)]="filters().title"
        (input)="loadDocuments()" />
    </span>
  </div>

  <p-table [value]="documents()" [lazy]="true" (onLazyLoad)="loadDocuments($event.first! / $event.rows!)"
    [paginator]="true" [rows]="10" [totalRecords]="totalRecords()" [loading]="loading()" [responsiveLayout]="'stack'"
    styleClass="p-datatable-striped">

    <ng-template pTemplate="header">
      <tr>
        <th>Título</th>
        <th>Status</th>
        <th>Versões</th>
        <th>Criado em</th>
        <th style="width: 8rem" class="text-right">Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-doc>
      <tr>
        <td>{{ doc.title }}</td>
        <td>
          <p-tag [value]="doc.status" [severity]="getStatusSeverity(doc.status)" />
        </td>
        <td>
          <i class="pi pi-copy mr-2"></i>{{ doc.versionCount }}
        </td>
        <td>{{ doc.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td class="text-right">
          <div class="flex justify-content-end gap-2">
            <p-button icon="pi pi-download" [text]="true" severity="info" pTooltip="Baixar" (click)="download(doc)" />
            <p-button icon="pi pi-history" [text]="true" severity="secondary" pTooltip="Histórico" />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center p-4">Nenhum documento encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<app-user-create-dialog [(visible)]="isCreateUserVisible" (onSave)="loadDocuments()">
</app-user-create-dialog>
