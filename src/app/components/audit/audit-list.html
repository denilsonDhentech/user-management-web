<div class="card p-4">
  <h2 class="m-0 mb-4 font-bold text-2xl">Trilha de Auditoria (Admin)</h2>

  <p-table [value]="logs()" [lazy]="true" (onLazyLoad)="loadLogs($event.first! / $event.rows!)" [paginator]="true"
    [rows]="rows()" [totalRecords]="totalRecords()" [loading]="loading()" styleClass="p-datatable-striped">

    <ng-template pTemplate="header">
      <tr>
        <th>Data/Hora</th>
        <th>Usuário</th>
        <th>Ação</th>
        <th>ID Documento</th>
        <th>Detalhes (Metadata)</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-log>
      <tr>
        <td>{{ log.timestamp | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
        <td><span class="font-semibold">{{ log.username }}</span></td>
        <td>
          <p-tag [value]="log.action" [severity]="getActionSeverity(log.action)" />
        </td>
        <td><code class="text-xs">{{ log.documentId }}</code></td>
        <td>
          <p-button icon="pi pi-search-plus" [text]="true" label="Ver JSON" (onClick)="op.toggle($event)" />

          <p-popover #op [style]="{width: '450px'}">
            <pre class="text-xs p-3 surface-ground border-round shadow-1 overflow-auto" style="max-height: 300px">
      {{ formatMetadata(log.metadata) | json }}
    </pre>
          </p-popover>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
