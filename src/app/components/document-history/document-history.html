<p-dialog
  [header]="'Histórico de Versões: ' + documentTitle()"
  [visible]="visible()"
  (visibleChange)="close()"
  [modal]="true"
  [style]="{ width: '75vw' }"
  [draggable]="false"
  [resizable]="false">

  <p-table [value]="versions()" [loading]="loading()" styleClass="p-datatable-striped p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 10%">Versão</th>
        <th>Data de Upload</th>
        <th>Responsável</th>
        <th>Tamanho</th>
        <th>Checksum (SHA-256)</th>
        <th style="width: 5rem" class="text-center">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-ver>
      <tr>
        <td><p-tag [value]="'v' + ver.versionNumber" severity="secondary" [rounded]="true" /></td>
        <td>{{ ver.uploadedAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td><span class="font-semibold">{{ ver.uploadedBy }}</span></td>
        <td>{{ (ver.size / 1024).toFixed(1) }} KB</td>
        <td>
          <code class="text-xs" [pTooltip]="ver.checksum">
            {{ ver.checksum.substring(0, 8) }}...
          </code>
        </td>
        <td class="text-center">
          <p-button
            icon="pi pi-download"
            [rounded]="true"
            [text]="true"
            (onClick)="onDownload.emit(ver.versionNumber)"
            pTooltip="Baixar esta versão" />
        </td>
      </tr>
    </ng-template>
  </p-table>

  <ng-template pTemplate="footer">
    <p-button label="Fechar" icon="pi pi-times" [text]="true" (onClick)="close()" />
  </ng-template>
</p-dialog>
